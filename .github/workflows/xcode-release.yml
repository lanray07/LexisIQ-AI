name: Xcode Build and App Store Upload

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "LexisIQAI/**"
      - "LexisIQAI.xcodeproj/**"
      - ".github/workflows/xcode-release.yml"
  workflow_dispatch:
    inputs:
      upload_to_app_store_connect:
        description: "Archive and upload the iOS build to App Store Connect"
        required: true
        type: boolean
        default: true
  release:
    types:
      - published

env:
  PROJECT_PATH: LexisIQAI.xcodeproj
  SCHEME: LexisIQAI
  CONFIGURATION: Release
  BUNDLE_IDENTIFIER: com.lexisiq.ai
  ARCHIVE_PATH: ${{ github.workspace }}/build/LexisIQAI.xcarchive
  EXPORT_PATH: ${{ github.workspace }}/build/export
  EXPORT_METHOD: ${{ secrets.EXPORT_METHOD || 'app-store-connect' }}
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.DEVELOPMENT_TEAM }}
  ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID || secrets.APP_STORE_CONNECT_KEY_ID || secrets.ASC_KEY_ID }}
  ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID || secrets.ASC_ISSUER_ID }}
  ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY || secrets.APP_STORE_CONNECT_PRIVATE_KEY || secrets.ASC_PRIVATE_KEY }}
  ASC_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 || secrets.ASC_PRIVATE_KEY_BASE64 }}
  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 || secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 || secrets.IOS_CERTIFICATE_P12_BASE64 || secrets.DISTRIBUTION_CERTIFICATE_BASE64 || secrets.APPLE_CERTIFICATE_BASE64 }}
  P12_PASSWORD: ${{ secrets.P12_PASSWORD || secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.IOS_CERTIFICATE_PASSWORD || secrets.DISTRIBUTION_CERTIFICATE_PASSWORD || secrets.APPLE_CERTIFICATE_PASSWORD }}
  BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 || secrets.IOS_PROVISION_PROFILE_BASE64 || secrets.IOS_PROFILE_BASE64 || secrets.PROVISIONING_PROFILE_BASE64 || secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

jobs:
  simulator-build:
    name: Build for iOS Simulator
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode project
        run: xcodebuild -list -project "$PROJECT_PATH"

      - name: Build unsigned simulator app
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

  archive-and-upload:
    name: Archive and Upload to App Store Connect
    runs-on: macos-15
    needs: simulator-build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Validate release secrets
        run: |
          set -euo pipefail
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is required."
              missing=1
            fi
          done
          if [[ -z "$ASC_PRIVATE_KEY" && -z "$ASC_PRIVATE_KEY_BASE64" ]]; then
            echo "::error::ASC_PRIVATE_KEY or ASC_PRIVATE_KEY_BASE64 is required."
            missing=1
          fi
          exit "$missing"

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys" "$HOME/.appstoreconnect/private_keys"
          API_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          if [[ -n "$ASC_PRIVATE_KEY_BASE64" ]]; then
            printf "%s" "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          else
            printf "%s" "$ASC_PRIVATE_KEY" > "$API_KEY_PATH"
          fi
          cp "$API_KEY_PATH" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$API_KEY_PATH" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Import signing certificate and provisioning profile
        if: env.BUILD_CERTIFICATE_BASE64 != '' && env.BUILD_PROVISION_PROFILE_BASE64 != ''
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf "%s" "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf "%s" "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Generate App Store signing assets
        if: env.BUILD_CERTIFICATE_BASE64 == '' || env.BUILD_PROVISION_PROFILE_BASE64 == ''
        run: |
          set -euo pipefail
          python3 -m pip install --user pyjwt cryptography

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          P12_PASSWORD="$(uuidgen)"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          PRIVATE_KEY_PATH="$RUNNER_TEMP/ios_distribution.key"
          CSR_PATH="$RUNNER_TEMP/ios_distribution.csr"
          CERT_DER_PATH="$RUNNER_TEMP/distribution.cer"
          CERT_PEM_PATH="$RUNNER_TEMP/distribution.pem"
          P12_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          openssl genrsa -out "$PRIVATE_KEY_PATH" 2048
          openssl req -new -key "$PRIVATE_KEY_PATH" -out "$CSR_PATH" -subj "/CN=LexisIQ AI GitHub Actions/O=LexisIQ AI/C=GB"

          python3 <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          import jwt

          api_key = Path(os.environ["API_KEY_PATH"]).read_text()
          token = jwt.encode(
              {
                  "iss": os.environ["ASC_ISSUER_ID"],
                  "iat": int(time.time()) - 60,
                  "exp": int(time.time()) + 20 * 60,
                  "aud": "appstoreconnect-v1",
              },
              api_key,
              algorithm="ES256",
              headers={"kid": os.environ["ASC_KEY_ID"], "typ": "JWT"},
          )

          base_url = "https://api.appstoreconnect.apple.com/v1"

          def request(method, path, payload=None):
              body = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(
                  f"{base_url}{path}",
                  data=body,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      return json.loads(response.read().decode())
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode()
                  raise RuntimeError(f"{method} {path} failed with {exc.code}: {detail}") from exc

          bundle_identifier = os.environ["BUNDLE_IDENTIFIER"]
          bundle_query = urllib.parse.urlencode({"filter[identifier]": bundle_identifier})
          bundle_data = request("GET", f"/bundleIds?{bundle_query}").get("data", [])
          if bundle_data:
              bundle_id = bundle_data[0]["id"]
          else:
              created_bundle = request(
                  "POST",
                  "/bundleIds",
                  {
                      "data": {
                          "type": "bundleIds",
                          "attributes": {
                              "identifier": bundle_identifier,
                              "name": "LexisIQ AI",
                              "platform": "IOS",
                          },
                      }
                  },
              )
              bundle_id = created_bundle["data"]["id"]

          csr_content = Path(os.environ["CSR_PATH"]).read_text()
          cert_error = None
          certificate = None
          for cert_type in ("DISTRIBUTION", "IOS_DISTRIBUTION"):
              try:
                  certificate = request(
                      "POST",
                      "/certificates",
                      {
                          "data": {
                              "type": "certificates",
                              "attributes": {
                                  "certificateType": cert_type,
                                  "csrContent": csr_content,
                              },
                          }
                      },
                  )["data"]
                  break
              except RuntimeError as exc:
                  cert_error = exc
          if certificate is None:
              raise cert_error

          cert_id = certificate["id"]
          cert_content = certificate["attributes"]["certificateContent"]
          Path(os.environ["CERT_DER_PATH"]).write_bytes(base64.b64decode(cert_content))

          profile_name = f"LexisIQ AI App Store GitHub {os.environ['GITHUB_RUN_ID']}"
          profile = request(
              "POST",
              "/profiles",
              {
                  "data": {
                      "type": "profiles",
                      "attributes": {
                          "name": profile_name,
                          "profileType": "IOS_APP_STORE",
                      },
                      "relationships": {
                          "bundleId": {
                              "data": {"type": "bundleIds", "id": bundle_id}
                          },
                          "certificates": {
                              "data": [{"type": "certificates", "id": cert_id}]
                          },
                      },
                  }
              },
          )["data"]

          Path(os.environ["PROFILE_PATH"]).write_bytes(
              base64.b64decode(profile["attributes"]["profileContent"])
          )
          with open(os.environ["GITHUB_ENV"], "a") as env:
              env.write(f"PROFILE_NAME={profile['attributes']['name']}\n")
              env.write("GENERATED_SIGNING_ASSETS=true\n")
          PY

          openssl x509 -inform DER -in "$CERT_DER_PATH" -out "$CERT_PEM_PATH"
          openssl pkcs12 -export -inkey "$PRIVATE_KEY_PATH" -in "$CERT_PEM_PATH" -out "$P12_PATH" -passout "pass:$P12_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/profile.plist")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
        env:
          CSR_PATH: ${{ runner.temp }}/ios_distribution.csr
          CERT_DER_PATH: ${{ runner.temp }}/distribution.cer
          PROFILE_PATH: ${{ runner.temp }}/profile.mobileprovision

      - name: Create export options
        run: |
          set -euo pipefail
          mkdir -p build
          if [[ -n "${PROFILE_NAME:-}" ]]; then
            SIGNING_STYLE="manual"
            PROFILE_BLOCK="<key>provisioningProfiles</key><dict><key>${BUNDLE_IDENTIFIER}</key><string>${PROFILE_NAME}</string></dict>"
          else
            SIGNING_STYLE="automatic"
            PROFILE_BLOCK=""
          fi
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>${SIGNING_STYLE}</string>
            ${PROFILE_BLOCK}
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Archive iOS app
        run: |
          set -euo pipefail
          mkdir -p build
          SIGNING_ARGS=(CODE_SIGN_STYLE=Automatic)
          if [[ -n "${PROFILE_NAME:-}" ]]; then
            SIGNING_ARGS=(CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Distribution" PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME")
          fi
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_IDENTIFIER" \
            "${SIGNING_ARGS[@]}" 2>&1 | tee build/archive.log

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" 2>&1 | tee build/export.log
          ls -la "$EXPORT_PATH"

      - name: Upload IPA to App Store Connect
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.upload_to_app_store_connect == true
        run: |
          set -euo pipefail
          IPA_PATH="$(find "$EXPORT_PATH" -name '*.ipa' -maxdepth 1 -print -quit)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "::error::No IPA found in $EXPORT_PATH."
            exit 1
          fi
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: LexisIQAI-iOS-release
          path: |
            build/**/*.ipa
            build/**/*.xcarchive
            build/**/*.log
            build/ExportOptions.plist
          if-no-files-found: ignore
          retention-days: 14
